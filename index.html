<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ryze Technology — a software studio engineering durable websites, mobile apps, and business systems."
    />

    <!-- Brand favicon: animated GIF (logo motion) with PNG fallbacks + theme color. -->
    <link rel="icon" type="image/gif" href="/favicon.gif" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/favicon-180.png" />
    <meta name="theme-color" content="#2156c9" />

    <title>Ryze Technology — Software Studio</title>

    <!--
      Static Open Graph / Twitter fallback for crawlers that do not execute JS.
      Per-route values are refined client-side by SEOHead (react-helmet-async).
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ryze Technology" />
    <meta property="og:title" content="Ryze Technology — Software Studio" />
    <meta
      property="og:description"
      content="Software built to last. Durable websites, apps, and business systems — designed and engineered in-house."
    />
    <meta property="og:url" content="https://ryze.technology/" />
    <meta property="og:image" content="https://ryze.technology/images/og/default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ryze Technology — Software Studio" />
    <meta
      name="twitter:description"
      content="Software built to last. Durable websites, apps, and business systems — designed and engineered in-house."
    />
    <meta name="twitter:image" content="https://ryze.technology/images/og/default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
