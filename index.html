<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ryze Technology — we build products that work forever." />
    <!-- Preload critical self-hosted variable fonts (display + sans) to cut CLS
         and avoid late font swaps (Requirements 41.3, 39.3). crossorigin is
         required for font fetches even from same origin. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/ClashDisplay-Variable.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/GeneralSans-Variable.woff2"
    />
    <title>Ryze Technology</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
